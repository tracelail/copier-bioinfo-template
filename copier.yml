_min_copier_version: "9.4.0"
_subdirectory: template
_templates_suffix: .jinja

_exclude:
  - "__pycache__"
  - "*.pyc"
  - ".DS_Store"

_tasks:
  - command: "git init"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "git add ."
    when: "{{ _copier_operation == 'copy' }}"

# ── Questions ────────────────────────────────────────────────────────────────

project_name:
  type: str
  help: "Project name (kebab-case, e.g. rna-seq-analysis)"
  default: my-bioinfo-project
  validator: >-
    {% if not (project_name | regex_search('^[a-z][a-z0-9-]+$')) %}
    Must be lowercase letters, digits, and hyphens only, starting with a letter.
    {% endif %}

# Computed from project_name — never asked
package_name:
  type: str
  default: "{{ project_name | replace('-', '_') }}"
  when: false

description:
  type: str
  help: "Short one-line project description"
  default: "A Python bioinformatics project"

author_name:
  type: str
  help: "Author full name"
  default: "trace"

author_email:
  type: str
  help: "Author email address"
  default: "your@email.com"

github_username:
  type: str
  help: "GitHub username or organization"
  default: "tracelail"

license:
  type: str
  help: "Project license"
  choices:
    "MIT": "MIT"
    "BSD-3-Clause": "BSD-3-Clause"
    "Apache-2.0": "Apache-2.0"
    "GPL-3.0-only": "GPL-3.0-only"
  default: "MIT"

python_version:
  type: str
  help: "Minimum Python version"
  choices:
    - "3.12"
    - "3.13"
  default: "3.13"

use_trace_bioutils:
  type: bool
  help: "Include trace-bioutils as a dependency?"
  default: true
